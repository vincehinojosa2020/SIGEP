# SIGEP Legacy Infrastructure - Intentionally uses old versions
version: "3.3"
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sigep:sigep123@db:5432/sigep
      - SECRET_KEY=django-insecure-key-for-development-only
      - DEBUG=True
    depends_on:
      - db
      - redis
  db:
    image: postgres:12
    environment:
      - POSTGRES_DB=sigep
      - POSTGRES_USER=sigep
      - POSTGRES_PASSWORD=sigep123
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:6.0
    ports:
      - "6379:6379"
volumes:
  pgdata:
